<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Relief Resource Allocation System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🚨 Disaster Relief Allocation System</h1>
            <p class="subtitle">Real-time resource distribution and route optimization</p>
        </header>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Left Panel - Controls -->
            <div class="left-panel">
                <div class="card">
                    <h2>📍 Add Location</h2>
                    <div class="input-group">
                        <label>Search Location</label>
                        <input type="text" id="location-input" placeholder="Enter city or region name">
                        <div class="button-group">
                            <button class="btn btn-disaster" id="btn-mark-disaster">
                                <span>🔴</span> Mark Disaster
                            </button>
                            <button class="btn btn-resource" id="btn-mark-resource">
                                <span>🟢</span> Mark Resource
                            </button>
                        </div>
                        <p class="hint">💡 Tip: You can also click directly on the map</p>
                    </div>
                </div>

                <div class="card">
                    <h2>📋 Locations (<span id="marker-count">0</span>)</h2>
                    <ul class="marker-list" id="marker-list">
                        <li class="empty-state">No locations added yet</li>
                    </ul>
                </div>

                <div class="card">
                    <button class="btn btn-secondary btn-full" id="btn-sample-data">
                        📦 Load Sample Data
                    </button>
                    <button class="btn btn-primary btn-full" id="btn-generate-run">
                        ⚡ Run Allocation
                    </button>
                </div>

                <div id="status"></div>
            </div>

            <!-- Center - Map -->
            <div class="center-panel">
                <div class="map-container">
                    <div id="map"></div>
                </div>
            </div>

            <!-- Right Panel - Results -->
            <div class="right-panel">
                <div class="card results-card">
                    <h2>📊 Allocation Results</h2>
                    <div id="report-output" class="report-container">
                        <div class="empty-state-report">
                            <p>🔍 No results yet</p>
                            <p class="hint">Add locations and run allocation to see results</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
